<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Black Market</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<header>
  <h1>BLACK MARKET</h1>
</header>

<div class="container">

  <div class="card">
    <img src="assets/images/gun.png">
    <h2>Weapon Crate</h2>
    <p>$12,000</p>
    <button onclick="buyItem('Weapon Crate')">BUY</button>
  </div>

  <div class="card">
    <img src="assets/images/drugs.png">
    <h2>Supply Pack</h2>
    <p>$5,500</p>
    <button onclick="buyItem('Supply Pack')">BUY</button>
  </div>

  <div class="card">
    <img src="assets/images/hack.png">
    <h2>Hacking Kit</h2>
    <p>$8,200</p>
    <button onclick="buyItem('Hacking Kit')">BUY</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
